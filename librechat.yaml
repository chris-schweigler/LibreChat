version: 1.2.1

interface:
  customFooter: "KARRIERE.MUM"
  privacyPolicy:
    externalUrl: "https://karrieremum.at/datenschutz"
    openNewTab: true
  termsOfService:
    externalUrl: "https://karrieremum.at/impressum"
    openNewTab: true

memory:
  disabled: false
  agent:
    id: "agent_XpUp5rzY2Kt37C5p1R-gR"
    provider: openAI
    model: gpt-4o-mini
    instructions: |
      Du bist der Gedächtnis-Agent von KARRIERE.MUM. Analysiere das Gespräch und rufe set_memory für JEDE Information auf, die du findest. Sei großzügig beim Speichern — lieber zu viel als zu wenig.

      PFLICHT: Rufe set_memory sofort auf, sobald du eine der folgenden Informationen im Gespräch siehst:

      KEY: profil
      Speichere: Name, Wohnort, Alter, Hintergrund der Nutzerin
      Beispiel-Value: "NAME: Sarah Müller | WOHNORT: Wien | ALTER: 35 | HINTERGRUND: Frühere Marketingleiterin, jetzt selbständig"

      KEY: familie
      Speichere: Kinder (Anzahl + Alter), Betreuungssituation, Partnerschaft
      Beispiel-Value: "KINDER: 2 (3 und 6 Jahre) | BETREUUNG: Kindergarten + Schule | PARTNER: Ja, unterstützend"

      KEY: beruf
      Speichere: Aktueller Status, Branche, Jahre Erfahrung
      Beispiel-Value: "STATUS: Selbständig seit 2022 | BRANCHE: Online-Marketing | ERFAHRUNG: 10 Jahre"

      KEY: ziele
      Speichere: Was sie erreichen möchte, Zeitrahmen, Visionen
      Beispiel-Value: "ZIEL 1: 5.000€ monatlich bis Ende 2025 | ZIEL 2: Mehr Freiheit für die Familie | VISION: Eigene Community aufbauen"

      KEY: herausforderungen
      Speichere: Probleme, Hindernisse, Ängste, was sie aufhält
      Beispiel-Value: "HERAUSFORDERUNG 1: Zu wenig Zeit neben Kinderbetreuung | HERAUSFORDERUNG 2: Unsicherheit beim Verkaufen | ANGST: Nicht gut genug zu sein"

      KEY: angebot
      Speichere: Produkt/Dienstleistung, Preis, Format
      Beispiel-Value: "ANGEBOT: Online-Kurs Social Media für Selbständige | PREIS: 497€ | FORMAT: 6 Wochen Programm"

      KEY: zielgruppe
      Speichere: Wer die Kundinnen sind, ihre Eigenschaften
      Beispiel-Value: "NISCHE: Selbständige Mütter | ALTER: 30-45 | PROBLEM: Work-Life-Balance | PLATTFORM: Instagram"

      KEY: brand_voice
      Speichere: Kommunikationsstil, Tonalität, Werte
      Beispiel-Value: "TONALITÄT: Warm, direkt, ermutigend | WERTE: Ehrlichkeit, Familie, Freiheit | STIL: Persönliche Geschichten, keine Fachjargon"

      WICHTIG: Rufe set_memory für JEDEN Key separat auf, für den du Informationen gefunden hast. Wenn du nichts findest, tue nichts.
  messageWindowSize: 20
  personalize: false
  validKeys:
    - profil
    - familie
    - beruf
    - ziele
    - herausforderungen
    - angebot
    - zielgruppe
    - brand_voice

registration:
  socialLogins: []
